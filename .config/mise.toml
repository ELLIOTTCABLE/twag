min_version = "2024.11.3"

[settings]
npm.bun = true
pipx.uvx = true

[tools]
"rust" = "1.87"
"cargo:sqlx-cli" = { version = "0.8", default-features = false, features = "native-tls,postgres" }
"cargo:cargo-watch" = "latest"

# Pre-commit tooling
# FIXME: Use the direct version of `hk` when the Aqua package is fixed
"java" = "22"
"pkl" = "0.28"
"cargo:hk" = { version = "1.1", postinstall = "hk install" }
"python" = "3.13"

# SQL formatting
"uv" = "latest"
"pipx:sqlfluff" = "latest"

[tasks.watch]
description = "Watches for changes in the source code and runs the server"
env = { RUST_LOG = "trace", RUST_FMT = "pretty", RUSTFLAGS = "-A dead_code -A unused_variables -A unused_imports" }
run = "cargo watch -w .env -w cargo.toml -w src -w templates --clear --exec 'run'"

[tasks."db:cache-typechecking"]
description = "Cache schema from $DATABASE_URL for SQLx typechecking"
run = "cargo sqlx prepare"

[tasks."db:provision"]
description = "Applies provisioning/grants.sql against $DATABASE_URL. Run once before db:migrate; idempotent."
sources = ["provisioning/*.sql"]
run = "psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1 -f provisioning/grants.sql"

[tasks."db:migrate"]
description = "Runs sqlx migrations against $DATABASE_URL"
sources = ["migrations/*.sql"]
run = "sqlx migrate run"

# --- Neon-specific local-dev convenience ---
# Wrap the universal db: tasks with a fetched twag_owner cred, passed inline
# via env-var (never persisted, never argv). neon:auth, by contrast, writes
# the *runtime* (twag_app) cred to .env so the app and other tools see it.

[tasks."neon:create"]
description = "Create the Neon project + twag_app role; no-op if `.neon` exists"
outputs = [".neon"]
run = """
if [ ! -f .neon ]; then
   neonctl -o json project create --set-context --name 'twag' --database 'twag' --role 'twag_owner' --cu 0.5 \
      | jq '{project: {id: .project.id, region_id: .project.region_id, name: .project.name}}' | { command -v yq >/dev/null && yq -y . || cat ;}
   neonctl -o json roles create --name 'twag_app' \
      | jq '{branch_id, name, authentication_method}' | { command -v yq >/dev/null && yq -y . || cat ;}
fi
"""

[tasks."neon:_assert-context"]
hide = true
run = """
if [ ! -f .neon ]; then
   echo 'No `.neon` context found; run `neonctl set-context` (or `mise run neon:create`) first.' >&2
   exit 1
fi
"""

[tasks."neon:provision"]
depends = ["neon:_assert-context"]
run = "DATABASE_URL=\"$(neonctl connection-string --role-name twag_owner)\" mise run db:provision"

[tasks."neon:migrate"]
depends = ["neon:_assert-context"]
run = "DATABASE_URL=\"$(neonctl connection-string --role-name twag_owner)\" mise run db:migrate"

[tasks."neon:auth"]
description = "Fetches the runtime (twag_app) Neon connection-string into .env"
depends = ["neon:_assert-context"]
run = [
   "sed -i.bak '/^DATABASE_URL=/d' .env 2>/dev/null; rm -f .env.bak",
   "echo \"DATABASE_URL='$(neonctl connection-string --role-name twag_app)'\" >> .env",
   "chmod 600 .env",
]
